name: reactTable_CI

on:
  push:
    branches:
      - main

jobs:
  build:
    runs-on: ubuntu-latest
    
    env:
      MONGO_URI: ${{ secrets.MONGO_URI }}
      PORT: ${{ secrets.PORT }}

    steps:
      - name: Checkout Code
        uses: actions/checkout@v3

      - name: Setup Node
        uses: actions/setup-node@v3
        with:
          node-version: 25

      # Backend
      - name: Install Server Dependencies
        run: |
          cd server
          npm install

      # Frontend
      - name: Install Client Dependencies
        run: |
          cd client
          npm install
          npm run build